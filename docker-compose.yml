version: '3.8'

services:
  bilibili-music:
    # 使用构建的镜像
    build:
      context: .
      dockerfile: Dockerfile
    image: bilibili-music-player:latest
    container_name: bilibili-music-player
    ports:
      - "8832:3000"
    volumes:
      # 数据持久化目录
      - ./data:/app/data
      - ./downloads:/app/downloads
      - ./cache:/app/cache
      - ./temp:/app/temp
    environment:
      - NODE_ENV=production
      - PORT=3000
      # 修改为你的 GitHub 用户名/组织名
      - REPO_OWNER=你的GitHub用户名
      - REPO_NAME=bilibili-music-player
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

