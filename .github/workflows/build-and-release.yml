name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci --legacy-peer-deps

      - name: Build backend
        working-directory: ./backend
        run: npm run build

      - name: Create release package
        run: |
          mkdir -p release
          # 复制后端代码和构建产物
          cp -r backend/dist release/
          cp backend/package*.json release/
          cp -r backend/data release/ 2>/dev/null || true
          # 复制前端构建产物
          cp -r frontend/dist release/public
          # 创建打包文件
          cd release
          tar -czf ../bilibili-music-player.tar.gz .

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: bilibili-music-player.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
